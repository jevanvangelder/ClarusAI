services:
  - type: web
    name: clarusai-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: clarusai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: clarusai-db
    databaseName: clarusai
    user: clarusai